services:
  - type: web
    name: jeopardy-tournament
    runtime: node
    plan: free
    buildCommand: DATABASE_URL="postgresql://x:x@localhost:5432/x" npm install && npm run build
    startCommand: node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST_PASSCODE
        sync: false
      - key: TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANTHROPIC_MODEL
        value: claude-opus-4-8
      - key: PORT
        value: 10000
