services:
  - type: web
    name: jeopardy-tournament
    runtime: node
    plan: free
    buildCommand: npm install && DATABASE_URL="postgresql://placeholder:placeholder@localhost:5432/placeholder" npm run prisma:generate -w server && npm run build
    startCommand: npx prisma migrate deploy --schema=server/prisma/schema.prisma && node server/dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST_PASSCODE
        sync: false
      - key: TOKEN_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
